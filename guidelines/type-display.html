<!-- @dsCard group="Type" viewport="700x180" name="Display · Shippori Mincho B1" subtitle="Hero kanji, titles, seals — weights 500–800" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:14px 16px;background:var(--n0);font-family:var(--gothic);color:var(--n11);}
.lbl{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--n8);}
.hero{display:flex;align-items:center;gap:22px;}
.k{font-family:var(--mincho);font-weight:800;font-size:76px;line-height:.9;text-shadow:0 0 50px color-mix(in srgb,var(--ember) 22%,transparent);}
.wm{font-family:var(--mincho);font-weight:700;font-size:44px;line-height:.95;letter-spacing:-.02em;}
.wm .dot{color:var(--ember);}
.read{font-family:var(--mincho);font-size:14px;color:var(--n9);letter-spacing:.12em;margin-top:8px;}
</style>
</head>
<body>
<div class="hero"><span class="k">燠火</span><div><div class="wm">Okibi<span class="dot">.</span></div><div class="read">おきび — banked embers</div></div><div style="margin-left:auto" class="lbl">--mincho<br>500 · 600 · 700 · 800</div></div>
</body>
</html>
