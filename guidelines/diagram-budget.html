<!-- @dsCard group="Document" viewport="700x200" name="Diagram · salience budget" subtitle="What a healthy view spends at rest" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:14px 16px;background:var(--n0);font-family:var(--gothic);color:var(--n11);}
.lbl{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--n8);}
.bar{display:flex;height:44px;border-radius:6px;overflow:hidden;border:1px solid var(--line);}
.bar i{display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;}
.legend{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10.5px;color:var(--n9);}
.li i{width:10px;height:10px;border-radius:2px;}
</style>
</head>
<body>
<div class="bar">
<i style="flex:85;background:var(--n2);color:var(--n8)">ground · ~85%</i>
<i style="flex:12;background:var(--n5);color:var(--n10)">structure</i>
<i style="flex:2.5;background:var(--call)"></i>
<i style="flex:0.8;background:var(--ember)"></i>
</div>
<div class="legend">
<span class="li"><i style="background:var(--n2);border:1px solid var(--line)"></i>ground — surfaces &amp; body text</span>
<span class="li"><i style="background:var(--n5)"></i>structure — borders, labels, gutters</span>
<span class="li"><i style="background:var(--call)"></i>meaning — the quiet pigments, ~3%</span>
<span class="li"><i style="background:var(--ember)"></i>the ember — &lt;1%, once or twice</span>
</div>
<div class="lbl" style="margin-top:10px">if the mix drifts brighter, remove colour — never balance it by adding more</div>
</body>
</html>
