<!-- @dsCard group="Type" viewport="700x190" name="Mono · JetBrains Mono" subtitle="Code, labels, kickers, data — Iosevka-class in native editors" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:14px 16px;background:var(--n0);font-family:var(--gothic);color:var(--n11);}
.lbl{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--n8);}
.kick{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.26em;text-transform:uppercase;color:var(--ember);}
.code{font-family:var(--mono);font-size:13px;line-height:1.85;margin-top:10px;color:var(--n11);}
.code .c{color:var(--syn-call)}.code .s{color:var(--syn-string)}.code .k{color:var(--syn-keyword)}.code .p{color:var(--syn-punct)}
.meta{display:flex;gap:16px;margin-top:10px;align-items:baseline;}
.val{font-family:var(--mono);font-size:11.5px;color:var(--n9);}
</style>
</head>
<body>
<div class="kick">Kicker · 11px · 600 · tracking .26em</div>
<div class="lbl" style="margin-top:6px">Label · 10px · 600 · tracking .14em</div>
<div class="code"><span class="k">const</span> theme <span style="color:var(--n10)">=</span> <span class="c">resolve</span><span class="p">(</span><span class="s">"okibi"</span><span class="p">);</span></div>
<div class="meta"><span class="val">filenames · values · 11.5px</span><span class="val" style="color:var(--n8)">gutters · n7</span></div>
</body>
</html>
