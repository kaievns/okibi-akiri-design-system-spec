<!-- @dsCard group="Brand" viewport="700x170" name="Ground glow" subtitle="One radial breath of warmth on the void — no patterns, no textures" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:14px 16px;background:var(--n0);font-family:var(--gothic);color:var(--n11);}
.lbl{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--n8);}
.ground{height:80px;border:1px solid var(--line);border-radius:6px;background-color:var(--n0);background-image:var(--glow-ember);display:flex;align-items:flex-end;padding:10px 14px;}
.ground.x4{background-image:radial-gradient(110% 50% at 84% -10%, color-mix(in srgb,var(--ember) 10%,transparent), transparent 56%);}
</style>
</head>
<body>
<div class="ground"><span class="lbl">.okibi-ground · actual strength — ember 2.5%, top-right</span></div>
<div class="ground x4" style="margin-top:8px"><span class="lbl">×4 exaggeration, for legibility only — never ship this</span></div>
</body>
</html>
