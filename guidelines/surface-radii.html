<!-- @dsCard group="Surface" viewport="700x170" name="Radii & borders" subtitle="Hairlines everywhere; radius by role" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:14px 16px;background:var(--n0);font-family:var(--gothic);color:var(--n11);}
.lbl{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--n8);}
.row{display:flex;gap:12px;align-items:flex-end;}
.b{border:1px solid var(--line);background:var(--n2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9.5px;color:var(--n8);flex-direction:column;gap:2px;}

</style>
</head>
<body>
<div class="row">
<div class="b" style="width:96px;height:96px;border-radius:7px">7<span>card</span></div>
<div class="b" style="width:86px;height:72px;border-radius:6px">6<span>notice</span></div>
<div class="b" style="width:80px;height:56px;border-radius:5px">5<span>control</span></div>
<div class="b" style="width:80px;height:44px;border-radius:4px">4<span>input</span></div>
<div class="b" style="width:72px;height:34px;border-radius:3px">3<span>tag</span></div>
<div class="b" style="width:96px;height:30px;border-radius:999px">999<span>pill</span></div>
</div>
<div class="lbl" style="margin-top:10px">1px var(--line) hairlines · dividers may fade to 55% · no 2px decorative borders</div>
</body>
</html>
