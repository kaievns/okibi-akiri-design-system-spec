<!-- @dsCard group="Surface" viewport="700x190" name="Interactive states" subtitle="Focus ring, selection, hover, active row" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:14px 16px;background:var(--n0);font-family:var(--gothic);color:var(--n11);}
.lbl{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--n8);}
.row{display:flex;gap:18px;align-items:center;flex-wrap:wrap;}
.input{background:var(--n1);border:1px solid var(--ember);border-radius:4px;padding:8px 12px;color:var(--n11);font-size:13px;box-shadow:var(--ring);font-family:var(--gothic);width:170px;}
.sel{background:var(--ember-soft);border:1px solid var(--ember-line);border-radius:3px;padding:6px 9px;font-family:var(--mono);font-size:12px;line-height:1;display:inline-flex;align-items:center;}
.hov{background:var(--n5);border-radius:4px;padding:10px 14px;font-size:13px;color:var(--n11);line-height:1;display:inline-flex;align-items:center;}
.rowitem{width:200px;background:var(--ember-soft);box-shadow:inset 2px 0 0 var(--ember);padding:6px 12px;font-family:var(--mono);font-size:12px;color:var(--n11);display:flex;gap:8px;align-items:center;}
.cap{margin-top:12px;}
</style>
</head>
<body>
<div class="row">
<input class="input" value="focused — ember + ring">
<span class="sel">selection</span>
<span class="hov">hover · n5</span>
<div class="rowitem">theme.rs<span style="margin-left:auto;color:var(--ok)">M</span></div>
</div>
<div class="lbl cap">focus = ember border + --ring halo · active row = soft fill + 2px inset ember bar · hover = one spine step up</div>
</body>
</html>
