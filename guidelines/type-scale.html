<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:14px 16px;background:var(--n0);font-family:var(--gothic);color:var(--n11);}
.lbl{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--n8);}
.r{display:flex;align-items:baseline;gap:14px;padding:4px 0;}
.r .t{color:var(--n11);}
.r .m{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--n8);white-space:nowrap;}
</style>
</head>
<body>
<div class="r"><span class="t" style="font-family:var(--mincho);font-weight:700;font-size:36px;line-height:1">Display</span><span class="m">50–74 · mincho 700</span></div>
<div class="r"><span class="t" style="font-family:var(--mincho);font-weight:700;font-size:24px">Title · h2</span><span class="m">28 · mincho 700</span></div>
<div class="r"><span class="t" style="font-family:var(--mincho);font-weight:700;font-size:17px">Heading · h3</span><span class="m">19 · mincho 700</span></div>
<div class="r"><span class="t" style="font-size:16px;color:var(--n10)">Lede — the section opener</span><span class="m">17.5 / 1.6 · gothic</span></div>
<div class="r"><span class="t" style="font-size:14.5px;color:var(--n10)">Body prose</span><span class="m">15.5 / 1.64</span></div>
<div class="r"><span class="t" style="font-family:var(--mono);font-size:12.5px">code lines</span><span class="m">13 / 1.85 · mono</span></div>
<div class="r"><span class="t lbl">label</span><span class="m">10 · mono 600 · upper</span></div>
</body>
</html>
