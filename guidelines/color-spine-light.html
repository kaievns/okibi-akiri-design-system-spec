<!-- @dsCard group="Colors" viewport="700x160" name="Spine · Akari (light)" subtitle="Warm paper, hue 80 — role-mapped, not inverted" -->
<!DOCTYPE html>
<html data-theme="light">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:14px 16px;background:var(--n0);font-family:var(--gothic);color:var(--n11);}
.lbl{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--n8);}
.spine{display:grid;grid-template-columns:repeat(12,1fr);border:1px solid var(--line);border-radius:6px;overflow:hidden;height:96px;}
.step{display:flex;flex-direction:column;justify-content:flex-end;padding:7px 6px;}
.step .nm{font-family:var(--mono);font-size:9.5px;font-weight:600;}
.step .use{font-size:8px;opacity:.85;line-height:1.2;}
.cap{margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--n8);}
</style>
</head>
<body>
<div class="spine"><div class="step" style="background:var(--n0);color:var(--n9)"><span class="nm">n0</span><span class="use">void</span></div><div class="step" style="background:var(--n1);color:var(--n9)"><span class="nm">n1</span><span class="use">chrome</span></div><div class="step" style="background:var(--n2);color:var(--n9)"><span class="nm">n2</span><span class="use">content</span></div><div class="step" style="background:var(--n3);color:var(--n9)"><span class="nm">n3</span><span class="use">raised</span></div><div class="step" style="background:var(--n4);color:var(--n9)"><span class="nm">n4</span><span class="use">input</span></div><div class="step" style="background:var(--n5);color:var(--n9)"><span class="nm">n5</span><span class="use">hover</span></div><div class="step" style="background:var(--n6);color:var(--n9)"><span class="nm">n6</span><span class="use">border</span></div><div class="step" style="background:var(--n7);color:var(--n0)"><span class="nm">n7</span><span class="use">gutter</span></div><div class="step" style="background:var(--n8);color:var(--n0)"><span class="nm">n8</span><span class="use">faint</span></div><div class="step" style="background:var(--n9);color:var(--n0)"><span class="nm">n9</span><span class="use">muted</span></div><div class="step" style="background:var(--n10);color:var(--n0)"><span class="nm">n10</span><span class="use">secondary</span></div><div class="step" style="background:var(--n11);color:var(--n0)"><span class="nm">n11</span><span class="use">primary</span></div></div><div class="cap">灯り akari — n4 is the brightest (input/card); n3 and n5 dip below the content ground</div>
</body>
</html>
