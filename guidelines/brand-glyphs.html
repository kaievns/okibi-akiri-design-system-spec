<!-- @dsCard group="Brand" viewport="700x160" name="Glyph set" subtitle="No icon font, no drawn SVGs — unicode in mono is the iconography" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:14px 16px;background:var(--n0);font-family:var(--gothic);color:var(--n11);}
.lbl{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--n8);}
.g{display:grid;grid-template-columns:repeat(9,1fr);gap:8px;}
.gi{border:1px solid var(--line);border-radius:4px;background:var(--n2);padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;}
.gi .ch{font-family:var(--mono);font-size:17px;color:var(--n10);}
.gi .nm{font-family:var(--mono);font-size:8px;color:var(--n8);}
</style>
</head>
<body>
<div class="g">
<div class="gi"><span class="ch">◐</span><span class="nm">theme</span></div>
<div class="gi"><span class="ch">⑂</span><span class="nm">branch</span></div>
<div class="gi"><span class="ch" style="color:var(--err)">✕</span><span class="nm">error</span></div>
<div class="gi"><span class="ch" style="color:var(--warn)">▲</span><span class="nm">warn</span></div>
<div class="gi"><span class="ch" style="color:var(--info)">ⓘ</span><span class="nm">info</span></div>
<div class="gi"><span class="ch" style="color:var(--ok)">✓</span><span class="nm">ok</span></div>
<div class="gi"><span class="ch">▾</span><span class="nm">open</span></div>
<div class="gi"><span class="ch">⚙</span><span class="nm">settings</span></div>
<div class="gi"><span class="ch" style="color:var(--ember)">燠</span><span class="nm">brand</span></div>
</div>
<div class="lbl" style="margin-top:8px">▤ ⌕ ◈ ⬡ activity · • hint · × close · kanji as icons (構 流 異) · no emoji, ever</div>
</body>
</html>
