<!-- @dsCard group="Colors" viewport="700x150" name="State colours" subtitle="The warm cluster owns alarm; always paired with shape" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;padding:14px 16px;background:var(--n0);font-family:var(--gothic);color:var(--n11);}
.lbl{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--n8);}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.sw{display:flex;flex-direction:column;gap:7px;}
.sw i{height:44px;border-radius:4px;border:1px solid color-mix(in srgb,var(--n11) 12%,transparent);}
.sw .nm{display:block;font-weight:600;font-size:12.5px;color:var(--n11);}
.sw .use{display:block;font-size:10.5px;color:var(--n9);line-height:1.3;}
</style>
</head>
<body>
<div class="grid">
<div class="sw"><i style="background:var(--ok)"></i><div><span class="nm">Success </span><span class="use">added · passing · modified</span></div></div>
<div class="sw"><i style="background:var(--warn)"></i><div><span class="nm">Yamabuki 山吹</span><span class="use">warning · untracked</span></div></div>
<div class="sw"><i style="background:var(--err)"></i><div><span class="nm">Ake 緋</span><span class="use">error · deletion</span></div></div>
<div class="sw"><i style="background:var(--info)"></i><div><span class="nm">Info 空</span><span class="use">hints · information</span></div></div>
<div class="sw"><i style="background:var(--spell)"></i><div><span class="nm">Spell </span><span class="use">spell/grammar overlay</span></div></div>
</div>
</body>
</html>
